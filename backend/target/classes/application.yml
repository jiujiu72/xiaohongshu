  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: xiaohongshu-jwt-secret-key-2024-must-be-at-least-256-bits-long
  expiration: 86400000
